<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #222;
}
</style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: { create, update }
};

let player;
let cursors;
let curve = 0;
let curveDirection = 1;

let speed = 0;
let maxSpeed = 12;
let acceleration = 0.2;
let friction = 0.05;

let currentRoadCenter = 0;
let currentRoadWidth = 0;

const game = new Phaser.Game(config);

function create() {
  this.add.rectangle(
    this.scale.width / 2,
    this.scale.height / 2,
    this.scale.width,
    this.scale.height,
    0x6ecb3c
  );

  this.road = this.add.graphics();

  player = this.add.rectangle(
    this.scale.width / 2,
    this.scale.height - 80,
    50,
    80,
    0xff0000
  );

  cursors = this.input.keyboard.createCursorKeys();
}

function update() {
  this.road.clear();

  // curva
  curve += 0.02 * curveDirection;
  if (curve > 1 || curve < -1) curveDirection *= -1;

  // pista perto do jogador
  let playerZone = 29;
  let playerScale = playerZone / 30;

  currentRoadWidth = 80 + playerScale * 180;
  currentRoadCenter = this.scale.width / 2 + (curve * Math.pow(playerScale, 2) * 200);

  for (let i = 0; i < 30; i++) {
    let scale = i / 30;
    let width = 80 + scale * 180;
    let offset = curve * Math.pow(scale, 2) * 200;

    let center = this.scale.width / 2 + offset;
    let y = i * 20;

    let borderWidth = 6 + scale * 10;
    let color = i % 2 === 0 ? 0xff0000 : 0xffffff;

    // bordas
    this.road.fillStyle(color);
    this.road.fillRect(center - width / 2 - borderWidth, y, borderWidth, 20);
    this.road.fillRect(center + width / 2, y, borderWidth, 20);

    // pista
    this.road.fillStyle(0x333333);
    this.road.fillRect(center - width / 2, y, width, 20);
  }

  // controle
  let speed = 6;
  
  // 🚀 ACELERAÇÃO
  if (cursors.up.isDown) {
    speed += acceleration;
  } else {
    speed -= friction;
  }

  // 🛑 FREIO
  if (cursors.down.isDown) {
    speed -= acceleration * 1.5;
  }

  // limite
  speed = Phaser.Math.Clamp(speed, 0, maxSpeed);
  
  // curva influencia
  player.x += curve * 2.5;

  // colisão
  let halfCar = player.width / 2;

  let leftLimit = currentRoadCenter - currentRoadWidth / 2 + halfCar;
  let rightLimit = currentRoadCenter + currentRoadWidth / 2 - halfCar;

  if (player.x < leftLimit) player.x = leftLimit;
  if (player.x > rightLimit) player.x = rightLimit;
}
</script>

</body>
</html>
