<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
  body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #222;
}
</style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,

  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },

  scene: { create, update }
};

let player;
let cursors;
let curve = 0;
let curveDirection = 1;

let currentRoadCenter = 0;
let currentRoadWidth = 0;

const game = new Phaser.Game(config);

function create() {
  this.add.rectangle(
  this.scale.width / 2,
  this.scale.height / 2,
  this.scale.width,
  this.scale.height,
  0x6ecb3c
);

  this.road = this.add.graphics();

  player = this.add.rectangle(
  this.scale.width / 2,
  this.scale.height - 80,
  50,
  80,
  0xff0000
);

  cursors = this.input.keyboard.createCursorKeys();
}

function update() {
  this.road.clear();

  // posição da pista perto do carro (parte inferior)
  let playerZone = 25;
  let scale = playerZone / 30;

  currentRoadWidth = 100 + scale * 250;
  currentRoadCenter = this.scale.width / 2 + (curve * Math.pow(playerScale, 2) * 200);

  // curva dinâmica
  curve += 0.02 * curveDirection;
  if (curve > 1 || curve < -1) curveDirection *= -1;

  for (let i = 0; i < 30; i++) {
    let scale = i / 30;
    let width = 100 + scale * 250;
    let offset = curve * Math.pow(scale, 2) * 200;

    let center = this.scale.width / 2 + offset;
    let y = i * 20;

  // largura da pista
    let roadWidth = width;
    let borderWidth = 10 + scale * 15;

  // alternância de cor (vermelho/branco)
    let color = i % 2 === 0 ? 0xff0000 : 0xffffff;

  // 🟥⬜ BORDA ESQUERDA
    this.road.fillStyle(color);
    this.road.fillRect(
      center - roadWidth / 2 - borderWidth,
      y,
      borderWidth,
      20
  );

  // 🟥⬜ BORDA DIREITA
    this.road.fillRect(
      center + roadWidth / 2,
      y,
      borderWidth,
      20
  );

  // 🛣️ PISTA
    this.road.fillStyle(0x333333);
    this.road.fillRect(
      center - roadWidth / 2,
      y,
      roadWidth,
      20
  );
}

  // 🎮 CONTROLE DO CARRO
  if (cursors.left.isDown) player.x -= 6;
  if (cursors.right.isDown) player.x += 6;

  // 🌀 CURVA PUXANDO O CARRO
  player.x += curve * 3;

  // 🚧 LIMITE DA PISTA
  let leftLimit = currentRoadCenter - currentRoadWidth / 2 + 10;
  let rightLimit = currentRoadCenter + currentRoadWidth / 2 - 10;

  // colisão esquerda
  if (player.x < leftLimit) {
    player.x = leftLimit + 2;
  }

  // colisão direita
  if (player.x > rightLimit) {
    player.x = rightLimit - 2;
  }
    
}
</script>

</body>
</html>
