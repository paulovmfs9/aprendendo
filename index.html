<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
  body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #222;
}
</style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,

  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },

  scene: { create, update }
};

let player;
let cursors;
let curve = 0;
let curveDirection = 1;
let roadLines = [];

const game = new Phaser.Game(config);

function create() {
  this.add.rectangle(
  this.scale.width / 2,
  this.scale.height / 2,
  this.scale.width,
  this.scale.height,
  0x6ecb3c
);

  this.road = this.add.graphics();

  for (let i = 0; i < 30; i++) {
    let line = this.add.rectangle(this.scale.width / 2, i * 20, 4, 10, 0xffffff);
    roadLines.push(line);
  }

  player = this.add.rectangle(
  this.scale.width / 2,
  this.scale.height - 80,
  50,
  80,
  0xff0000
);

  cursors = this.input.keyboard.createCursorKeys();
}

function update() {
  this.road.clear();

  // curva dinâmica
  curve += 0.02 * curveDirection;
  if (curve > 1 || curve < -1) curveDirection *= -1;

  for (let i = 0; i < 30; i++) {
    let scale = i / 30;
    let width = 100 + scale * 250;
    let offset = curve * Math.pow(scale, 2) * 200;

    this.road.fillStyle(0x333333);
    this.road.fillRect(
      this.scale.width / 2 - width / 2 + offset,
      i * 20,
      width,
      20
    );
  }

  // linhas
  roadLines.forEach((line, i) => {
    let scale = i / 30;
    let offset = curve * Math.pow(scale, 2) * 200;

    line.y += 5;
    line.x = this.scale.width / 2 + offset; 
    line.width = 4 + scale * 10;

    if (line.y > 600) line.y = 0;
  });

  // 🎮 CONTROLE DO CARRO
  if (cursors.left.isDown) player.x -= 6;
  if (cursors.right.isDown) player.x += 6;

  // 🌀 CURVA PUXANDO O CARRO
  player.x += curve * 3;

  // 🚧 LIMITE DA PISTA
  if (player.x < this.scale.width * 0.2) player.x = this.scale.width * 0.2;
  if (player.x > this.scale.width * 0.8) player.x = this.scale.width * 0.8;
}
</script>

</body>
</html>
