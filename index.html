<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Mario Kart 🏎️</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
  body { margin: 0; background: #222; }
</style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 400,
  height: 600,
  physics: { default: 'arcade' },
  scene: { create, update }
};

let player;
let cursors;
let roadLines = [];

const game = new Phaser.Game(config);

function create() {
  // fundo da estrada
  this.add.rectangle(200, 300, 300, 600, 0x333333);

  // linhas da pista
  for (let i = 0; i < 20; i++) {
    let line = this.add.rectangle(200, i * 40, 5, 20, 0xffffff);
    roadLines.push(line);
  }

  // jogador (carrinho)
  player = this.add.rectangle(200, 500, 40, 60, 0xff0000);

  // controles
  cursors = this.input.keyboard.createCursorKeys();
}

function update() {
  // mover linhas da pista
  roadLines.forEach(line => {
    line.y += 5;
    if (line.y > 600) line.y = 0;
  });

  // movimento do carro
  if (cursors.left.isDown) player.x -= 5;
  if (cursors.right.isDown) player.x += 5;

  // limites
  if (player.x < 80) player.x = 80;
  if (player.x > 320) player.x = 320;
}
</script>

</body>
</html>
